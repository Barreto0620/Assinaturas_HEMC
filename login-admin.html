<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Administrativo | Assina.ai - HEMC</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">

  <script>
    // Sincronizador Atômico de Tema: impede a cintilação (flash) visual ao carregar a página
    (function () {
      try {
        var temaSalvo = localStorage.getItem('hemc-tema');
        if (temaSalvo === 'light' || temaSalvo === 'dark') {
          document.documentElement.setAttribute('data-theme', temaSalvo);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">

  <style>
    #form-auth {
      display: flex;
      flex-direction: column;
    }
    .campo-email { order: 1; }
    .campo-senha { order: 2; }
    .acoes { order: 3; margin-top: 24px; }
    .mensagem-erro, .mensagem-sucesso { order: 4; }

    /* =========================================================
       🖼️ Logo institucional — canto superior esquerdo
       ========================================================= */
    .logo-institucional {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .logo-institucional img {
      height: 72px;
      width: auto;
      display: block;
    }
    @media (max-width: 600px) {
      .logo-institucional {
        top: 12px;
        left: 12px;
      }
      .logo-institucional img {
        height: 52px;
      }
    }
  </style>
</head>

<body>

  <div class="logo-institucional">
    <img src="img/logo_assina.png" alt="Logo Hospital Estadual Mário Covas">
  </div>

  <div class="login-wrapper">

    <button type="button" class="login-theme-toggle" id="btn-tema-login" aria-label="Alternar tema claro/escuro">
      <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.07" x2="5.64" y2="17.66"></line>
        <line x1="18.36" y1="5.34" x2="19.78" y2="4.22"></line>
      </svg>
      <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <div class="login-card">
      <h1 id="titulo-form">Painel Admin</h1>
      <p class="subtitulo" id="subtitulo-form">Acesso restrito para gestão e administração</p>

      <form id="form-auth">

        <div class="campo campo-email">
          <label for="email">E-mail corporativo</label>
          <input id="email" type="email" required placeholder="admin@hemc.fuabc.org.br" style="width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--assina-border); background: var(--assina-surface); color: var(--assina-text);">
        </div>

        <div class="campo campo-senha">
          <label for="senha">Senha</label>
          <input id="senha" type="password" required placeholder="••••••••" style="width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--assina-border); background: var(--assina-surface); color: var(--assina-text); margin-top: 8px;">
        </div>

        <div class="acoes">
          <button type="submit" id="btn-submit" class="btn" style="width: 100%;">Acessar Painel</button>
        </div>

        <div id="msg-erro" class="mensagem-erro"></div>
      </form>
    </div>

    <a href="https://github.com/Barreto0620" target="_blank" rel="noopener noreferrer" class="developer-badge" title="Ver portfólio no GitHub">
      <div class="avatar-icon">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </div>
      <div class="text-container">
        <span class="label-dev">Desenvolvido por</span>
        <span class="name-dev">Gabriel Barreto</span>
      </div>
    </a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // -------------------------------------------------------------
      // 🌓 Lógica Dinâmica do Alternador de Temas (Sincronizado)
      // -------------------------------------------------------------
      const root = document.documentElement;
      const btnTema = document.getElementById('btn-tema-login');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');

      function obterTemaAtual() {
        return root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      }

      function atualizarIconesVisuais(tema) {
        if (tema === 'light') {
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
      }

      btnTema.addEventListener('click', () => {
        const novoTema = obterTemaAtual() === 'light' ? 'dark' : 'light';
        
        if (novoTema === 'dark') {
          root.removeAttribute('data-theme');
        } else {
          root.setAttribute('data-theme', 'light');
        }
        
        try { localStorage.setItem('hemc-tema', novoTema); } catch(e) {}
        atualizarIconesVisuais(novoTema);
      });

      // Inicializa exibição correta dos ícones baseados no antiflash script
      atualizarIconesVisuais(obterTemaAtual());
    });
  </script>

  <script type="module">
    import { supabaseClient } from './js/supabaseClient.js'; // Confirme se o caminho para o cliente Supabase está correto

    const formAuth = document.getElementById('form-auth');
    const btnSubmit = document.getElementById('btn-submit');
    const msgErro = document.getElementById('msg-erro');

    formAuth.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      
      // Limpa erros anteriores e mostra estado de carregamento
      msgErro.classList.remove('visivel');
      msgErro.textContent = '';
      btnSubmit.textContent = 'Autenticando...';
      btnSubmit.disabled = true;

      try {
        // 1. Tenta fazer o login no Auth do Supabase
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: senha
        });

        if (authError) throw new Error('Credenciais inválidas. Verifique seu e-mail e senha.');

        // 2. Valida se o usuário tem privilégio de administrador na tabela "profiles"
        const { data: profileData, error: profileError } = await supabaseClient
          .from('profiles')
          .select('is_admin')
          .eq('id', authData.user.id)
          .single();

        if (profileError || !profileData || !profileData.is_admin) {
          // Se não for admin, encerra a sessão gerada e barra o acesso
          await supabaseClient.auth.signOut();
          throw new Error('Acesso negado. Você não tem permissão de administrador.');
        }

        // 3. Sucesso! Redireciona para o painel principal
        window.location.href = '/admin.html';

      } catch (error) {
        msgErro.textContent = error.message;
        msgErro.classList.add('visivel');
      } finally {
        btnSubmit.textContent = 'Acessar Painel';
        btnSubmit.disabled = false;
      }
    });
  </script>
</body>
</html>
