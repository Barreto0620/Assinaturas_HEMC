<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Assina.ai - HEMC</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">

  <script>
    // Roteador Inteligente de Ambiente & Sincronizador Atômico de Tema
    (function () {
      // 1. Intercepta o subdomínio administrativo e redireciona instantaneamente
      if (window.location.hostname === 'painel-hemc-assina.vercel.app' && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
        window.location.href = '/login-admin.html';
        return; 
      }

      // 2. Sincronizador de Tema original (impede o flash visual)
      try {
        var temaSalvo = localStorage.getItem('hemc-tema');
        if (temaSalvo === 'light' || temaSalvo === 'dark') {
          document.documentElement.setAttribute('data-theme', temaSalvo);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">

  <style>
    #form-auth {
      display: flex;
      flex-direction: column;
    }
    .campo-nome { order: 1; }
    .campo-email { order: 2; }
    .campo-senha { order: 3; }
    .campo-cargo { order: 4; }
    .campo-ramal { order: 5; }
    .acoes { order: 6; margin-top: 24px; }
    .mensagem-erro, .mensagem-sucesso { order: 7; }

    /* =========================================================
       Protetor Logo institucional — canto superior esquerdo
       ========================================================= */
    .logo-institucional {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .logo-institucional img {
      height: 72px;
      width: auto;
      display: block;
    }
    @media (max-width: 600px) {
      .logo-institucional {
        top: 12px;
        left: 12px;
      }
      .logo-institucional img {
        height: 52px;
      }
    }

    /* =========================================================
       Status de verificação do Cargo institucional (automático)
       ========================================================= */
    #cargo {
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: not-allowed;
    }
    #cargo.campo-validado {
      border-color: #2e7d4f;
      background: rgba(46, 125, 79, 0.08);
      cursor: default;
    }
    #cargo.campo-nao-localizado {
      border-color: #c0392b;
      background: rgba(192, 57, 43, 0.08);
    }

    /* =========================================================
       Modal de Redefinição de Senha (Primeiro Acesso)
       ========================================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-overlay.visivel {
      display: flex;
    }
    .modal-redefinir-senha {
      background: #ffffff;
      color: #1a1a2e;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .modal-redefinir-senha h2 {
      margin: 0 0 6px 0;
      font-size: 1.25rem;
      color: #1a1a2e;
      font-weight: 700;
    }
    .modal-redefinir-senha p.aviso {
      margin: 0 0 20px 0;
      font-size: 0.875rem;
      color: #5a5a6e;
      line-height: 1.5;
    }
    .modal-redefinir-senha form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-redefinir-senha label {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
      color: #1a1a2e;
    }
    .modal-redefinir-senha input {
      width: 100%;
      box-sizing: border-box;
      background: #f3f4f8;
      border: 1px solid #d8dae2;
      color: #1a1a2e;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.9375rem;
    }
    .modal-redefinir-senha input::placeholder {
      color: #9497a8;
    }
    .modal-redefinir-senha input:focus {
      outline: none;
      border-color: #4f6df5;
      background: #ffffff;
    }
    .modal-redefinir-senha .acoes-modal {
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <!-- Logo Institucional -->
  <div class="logo-institucional">
    <img src="img/logo_assina.png" alt="Logo Hospital Estadual Mário Covas">
  </div>

  <div class="login-wrapper">

    <!-- Alternador de Tema Sincronizado -->
    <button type="button" class="login-theme-toggle" id="btn-tema-login" aria-label="Alternar tema claro/escuro">
      <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.07" x2="5.64" y2="17.66"></line>
        <line x1="18.36" y1="5.34" x2="19.78" y2="4.22"></line>
      </svg>
      <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <!-- Card de Autenticação -->
    <div class="login-card">
      <h1 id="titulo-form">Entrar</h1>
      <p class="subtitulo" id="subtitulo-form">Acesse e valide seus dados institucionais</p>

      <form id="form-auth">

        <div class="campo campo-nome">
          <label for="nome">Nome completo</label>
          <input id="nome" type="text" required placeholder="Ex: Gabriel Barreto" autocomplete="name">
        </div>

        <div class="campo campo-email">
          <label for="email">E-mail institucional</label>
          <div class="email-field-group">
            <input id="email" class="email-input" type="text" required placeholder="nome.sobrenome">
            <span class="email-suffix">@hemc.fuabc.org.br</span>
          </div>
        </div>

        <div class="campo campo-senha">
          <label for="senha">Senha</label>
          <input id="senha" type="password" required minlength="6" placeholder="••••••••">
        </div>

        <div class="campo campo-cargo">
          <label for="cargo">Cargo</label>
          <input id="cargo" type="text" required readonly placeholder="Ex: Analista de TI">
        </div>

        <div class="campo campo-ramal">
          <label for="telefone">Ramal</label>
          <div class="ramal-field-group">
            <span class="ramal-prefix">2829-</span>
            <input id="telefone" class="ramal-input" type="text" 
                   inputmode="numeric" 
                   maxlength="4" 
                   pattern="\d{4}" 
                   title="Digite exatamente os 4 dígitos do seu ramal"
                   required
                   placeholder="XXXX">
          </div>
        </div>

        <div class="acoes">
          <button type="submit" id="btn-submit" class="btn">Entrar</button>
        </div>

        <div id="msg-erro" class="mensagem-erro"></div>
        <div id="msg-sucesso" class="mensagem-sucesso"></div>
      </form>
    </div>

    <!-- Floating Developer Portfolio Badge -->
    <a href="https://github.com/Barreto0620" target="_blank" rel="noopener noreferrer" class="developer-badge" title="Ver portfólio no GitHub">
      <div class="avatar-icon">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </div>
      <div class="text-container">
        <span class="label-dev">Desenvolvido por</span>
        <span class="name-dev">Gabriel Barreto</span>
      </div>
    </a>
  </div>

  <!-- Modal: Redefinição Obrigatória de Senha (Primeiro Acesso) -->
  <div class="modal-overlay" id="modal-redefinir-senha-overlay">
    <div class="modal-redefinir-senha">
      <h2>Defina sua nova senha</h2>
      <p class="aviso">Por segurança, este é seu primeiro acesso. Crie uma nova senha para continuar.</p>

      <form id="form-redefinir-senha">
        <div class="campo">
          <label for="nova-senha">Nova senha</label>
          <input id="nova-senha" type="password" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>

        <div class="campo">
          <label for="confirmar-senha">Confirmar nova senha</label>
          <input id="confirmar-senha" type="password" required minlength="6" placeholder="Repita a nova senha" autocomplete="new-password">
        </div>

        <div class="acoes-modal">
          <button type="submit" id="btn-confirmar-redefinicao" class="btn">Salvar e continuar</button>
        </div>

        <div id="msg-erro-redefinicao" class="mensagem-erro"></div>
      </form>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>

  <!-- Script Interno para controle de Tema e máscaras de validação -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // -------------------------------------------------------------
      // 🌓 Lógica Dinâmica do Alternador de Temas (Sincronizado)
      // -------------------------------------------------------------
      const root = document.documentElement;
      const btnTema = document.getElementById('btn-tema-login');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');

      function obterTemaAtual() {
        return root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      }

      function atualizarIconesVisuais(tema) {
        if (tema === 'light') {
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
      }

      btnTema.addEventListener('click', () => {
        const novoTema = obterTemaAtual() === 'light' ? 'dark' : 'light';
        
        if (novoTema === 'dark') {
          root.removeAttribute('data-theme');
        } else {
          root.setAttribute('data-theme', 'light');
        }
        
        try { localStorage.setItem('hemc-tema', novoTema); } catch(e) {}
        atualizarIconesVisuais(novoTema);
      });

      // Inicializa exibição correta dos ícones baseados no antiflash script
      atualizarIconesVisuais(obterTemaAtual());

      // -------------------------------------------------------------
      // 🔒 Máscaras de Entrada de Dados (Sanitização)
      // -------------------------------------------------------------
      const inputNome = document.getElementById("nome");
      const inputCargo = document.getElementById("cargo");
      const inputRamal = document.getElementById("telefone");
      const inputEmail = document.getElementById("email");

      if (inputNome) {
        inputNome.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^A-Za-zÀ-ÿ\s\-\.\']/g, "");
        });
      }
      if (inputCargo) {
        inputCargo.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^A-Za-zÀ-ÿ\s\-\.\,]/g, "");
        });
      }
      if (inputRamal) {
        inputRamal.addEventListener("input", (e) => {
          e.target.value = e.target.value.replace(/[^0-9]/g, "");
        });
      }
      if (inputEmail) {
        inputEmail.addEventListener("input", (e) => {
          e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9\.\-\_]/g, "");
        });
      }
    });
  </script>
</body>

</html>
